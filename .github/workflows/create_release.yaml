name: Create Release

env:
  CI: true

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable long paths in Git
      run: git config --system core.longpaths true

    - name: Enable Win32 long paths at runtime
      shell: pwsh
      run: reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Extract version from version.h
      id: extract_version
      shell: bash
      run: |
        VERSION_FILE="ASI Mod/src/resources/version.h"
        echo "Reading version from $VERSION_FILE"

        VERSION_MAJOR=$(grep '#define VERSION_MAJOR' "$VERSION_FILE" | awk '{print $3}')
        VERSION_MINOR=$(grep '#define VERSION_MINOR' "$VERSION_FILE" | awk '{print $3}')
        VERSION_PATCH=$(grep '#define VERSION_PATCH' "$VERSION_FILE" | awk '{print $3}')

        version="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
        echo "Parsed version: $version"

        echo "version=$version" >> $GITHUB_OUTPUT

    - name: Verify release does not already exist
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $version = "${{ steps.extract_version.outputs.version }}"

        Write-Host "Checking whether release/tag already exists for version $version..."

        $releaseExists = gh release view $version --repo "${{ github.repository }}" 2>$null

        if ($LASTEXITCODE -eq 0) {
          Write-Error "Release posting already exists for version $version. Bump version.h before creating a new release."
          exit 1
        }

        $tagExists = git ls-remote --tags origin "refs/tags/$version"

        if ($tagExists) {
          Write-Error "Git tag already exists for version $version. Bump version.h before creating a new release."
          exit 1
        }

        Write-Host "No existing release or tag found for version $version."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # -------------------------
    # Prepare output structure
    # -------------------------
    - name: Create dist folder structure
      shell: pwsh
      run: |
        $baseTargets = @("dist", "dist_2x", "dist_4x")
        $uiTargets   = @("dist_ui", "dist_2x_ui", "dist_4x_ui")

        $baseSubdirs = @("textures", "plugins", "logs")
        $uiSubdirs   = @("textures")

        foreach ($t in $baseTargets) {
          New-Item -ItemType Directory -Path $t -Force | Out-Null
          foreach ($s in $baseSubdirs) {
            New-Item -ItemType Directory -Path "$t/$s" -Force | Out-Null
          }
        }

        foreach ($t in $uiTargets) {
          New-Item -ItemType Directory -Path $t -Force | Out-Null
          foreach ($s in $uiSubdirs) {
            New-Item -ItemType Directory -Path "$t/$s" -Force | Out-Null
          }
        }


    # -------------------------
    # Build
    # -------------------------
    - name: Build
      run: msbuild "ASI Mod\${{ github.event.repository.name }}.sln" /m -t:rebuild -verbosity:minimal -property:Configuration=Release -property:Platform=x64  -property:PlatformToolset=v143
    
    - name: Copy ASI files into all dist folders
      shell: pwsh
      run: |
        $targets = @("dist", "dist_2x", "dist_4x")

        foreach ($t in $targets) {
          Write-Host "Copying to $t"

          Copy-Item "ASI Mod\x64\Release\${{ github.event.repository.name }}.asi" "$t/plugins/${{ github.event.repository.name }}.asi"
          Copy-Item "ASI Mod\${{ github.event.repository.name }}.ini" "$t/plugins/${{ github.event.repository.name }}.ini"
          Copy-Item README.md "$t/textures/${{ github.event.repository.name }}_README.md" -Force
          Copy-Item README.md "$t/logs/${{ github.event.repository.name }}_Game.log" -Force
          Copy-Item README.md "$t/logs/${{ github.event.repository.name }}_Launcher.log" -Force
          Copy-Item LICENSE "$t/textures/${{ github.event.repository.name }}_LICENSE" -Force
        }

    # Build Dist Folders
    - name: Build Dist Folders
      run: |
        $RepoRootDir = "${{ github.workspace }}"
        $scriptPath  = Join-Path $RepoRootDir "Build_Dist_Folders.py"

        if (-not (Test-Path $scriptPath)) {
          Write-Error "Build_Dist_Folders.py not found at $scriptPath"
          exit 1
        }

        Write-Host "Running Build_Dist_Folders.py..."
        py $scriptPath

    # Package everything - Base
    - name: Create Base release zip
      working-directory: dist
      run: 7z a -tzip "../MGS3-Demastered-Sub_Base_PS2_Resolution_v${{ steps.extract_version.outputs.version }}.zip" *

    - name: Create 2x Upscaled release zip
      working-directory: dist_2x
      run: 7z a -tzip "../MGS3-Demastered-Sub_Base_2x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip" *

    - name: Create 4x Upscaled release zip
      working-directory: dist_4x
      run: 7z a -tzip "../MGS3-Demastered-Sub_Base_4x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip" *

    # Package everything - UI only
    - name: Create UI-only Base release zip
      working-directory: dist_ui
      run: 7z a -tzip "../MGS3-Demastered-Sub_UI_ONLY_PS2_Resolution_v${{ steps.extract_version.outputs.version }}.zip" *

    - name: Create UI-only 2x Upscaled release zip
      working-directory: dist_2x_ui
      run: 7z a -tzip "../MGS3-Demastered-Sub_UI_ONLY_2x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip" *

    - name: Create UI-only 4x Upscaled release zip
      working-directory: dist_4x_ui
      run: 7z a -tzip "../MGS3-Demastered-Sub_UI_ONLY_4x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip" *

    - name: Generate Release Posting
      uses: ncipollo/release-action@v1
      with:
        artifacts: >
          MGS3-Demastered-Sub_UI_ONLY_4x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip,
          MGS3-Demastered-Sub_UI_ONLY_2x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip,
          MGS3-Demastered-Sub_UI_ONLY_PS2_Resolution_v${{ steps.extract_version.outputs.version }}.zip,
          MGS3-Demastered-Sub_Base_4x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip,
          MGS3-Demastered-Sub_Base_2x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip,
          MGS3-Demastered-Sub_Base_PS2_Resolution_v${{ steps.extract_version.outputs.version }}.zip
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.extract_version.outputs.version }}
        name: "${{ steps.extract_version.outputs.version }}"
        draft: true
        generateReleaseNotes: true
        artifactErrorsFailBuild: true


    - name: Upload to NexusMods - Base - PS2 Resolution
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7338893
        display_name: "MGS3 PS2 Demaster (Sub) - Base - PS2 Resolution"
        filename: MGS3-Demastered-Sub_Base_PS2_Resolution_v${{ steps.extract_version.outputs.version }}.zip
        version: "${{ steps.extract_version.outputs.version }}"
        file_category: main
        archive_existing_file: true
        description: |
            All the original PS2 textures at their original size.

            UI textures not included.

    - name: Upload to NexusMods - Base - 2x AI Upscaled
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7338887
        display_name: "MGS3 PS2 Demaster (Sub) - Base - 2x AI Upscaled"
        filename: MGS3-Demastered-Sub_Base_2x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip
        version: "${{ steps.extract_version.outputs.version }}"
        file_category: main
        archive_existing_file: true
        description: |
            The original PS2 textures, 2x AI upscaled using the same upscaler as the MGS3 Community Bugfix Compilation for visual consistency.

            UI textures not included.

    - name: Upload to NexusMods - Base - 4x AI Upscaled
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7338884
        display_name: "MGS3 PS2 Demaster (Sub) - Base - 4x AI Upscaled"
        filename: MGS3-Demastered-Sub_Base_4x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip
        version: "${{ steps.extract_version.outputs.version }}"
        file_category: main
        archive_existing_file: true
        description: |
            The original PS2 textures, 4x AI upscaled using the same upscaler as the MGS3 Community Bugfix Compilation for visual consistency.

            UI textures not included.


    - name: Upload to NexusMods - UI Only - PS2 Resolution
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7338896
        display_name: "MGS3 PS2 Demaster (Sub) - UI Only - PS2 Resolution"
        filename: MGS3-Demastered-Sub_UI_ONLY_PS2_Resolution_v${{ steps.extract_version.outputs.version }}.zip
        version: "${{ steps.extract_version.outputs.version }}"
        file_category: optional
        archive_existing_file: true
        description: |
            All the original PS2 UI textures, at their original resolution.

            This is ONLY the UI textures!

            (Weapon and equipment icons not yet demastered.)


    - name: Upload to NexusMods - UI Only - 2x AI Upscaled
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7338905
        display_name: "MGS3 PS2 Demaster (Sub) - UI Only - 2x AI Upscaled"
        filename: MGS3-Demastered-Sub_UI_ONLY_2x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip
        version: "${{ steps.extract_version.outputs.version }}"
        file_category: optional
        archive_existing_file: true
        description: |
            The original PS2 UI textures, 2x AI upscaled using the same upscaler as the MGS3 Community Bugfix Compilation for visual consistency.

            This is ONLY the UI textures!

            (Weapon and equipment icons not yet demastered)


    - name: Upload to NexusMods - UI Only - 4x AI Upscaled
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7338908
        display_name: "MGS3 PS2 Demaster (Sub) - UI Only - 4x AI Upscaled"
        filename: MGS3-Demastered-Sub_UI_ONLY_4x_AI_Upscaled_v${{ steps.extract_version.outputs.version }}.zip
        version: "${{ steps.extract_version.outputs.version }}"
        file_category: optional
        archive_existing_file: true
        description: |
            The original PS2 UI textures, 4x AI upscaled using the same upscaler as the MGS3 Community Bugfix Compilation for visual consistency.

            This is ONLY the UI textures!

            (Weapon and equipment icons not yet demastered)
